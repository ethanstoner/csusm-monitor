<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSUSM Campus Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #111318;
            --surface: #191c24;
            --surface-raised: #1f222c;
            --border: #282c37;
            --border-subtle: #22252e;
            --text: #e4e7ed;
            --text-dim: #8b919e;
            --text-faint: #565c6a;
            --blue: #3b82f6;
            --green: #22c55e;
            --amber: #eab308;
            --red: #ef4444;
            --sans: 'DM Sans', -apple-system, sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --radius: 10px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-size: 14px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ── NAVBAR ── */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            height: 52px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: -0.2px;
        }

        .nav-brand svg { flex-shrink: 0; }

        .nav-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-dim);
        }

        .live-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: blink 2.5s ease-in-out infinite;
        }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

        /* ── LAYOUT ── */
        .page { padding: 20px 28px 48px; max-width: 1320px; margin: 0 auto; }

        /* ── CONDITIONS ROW ── */
        .conditions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .cond-item {
            background: var(--surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            padding: 14px 16px;
        }

        .cond-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-faint);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 6px;
        }

        .cond-value {
            font-family: var(--mono);
            font-size: 22px;
            font-weight: 600;
            line-height: 1.1;
        }

        .cond-sub {
            font-size: 12px;
            color: var(--text-faint);
            margin-top: 3px;
        }

        /* ── MAIN GRID ── */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            padding: 18px 20px;
        }

        .card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .card-tag {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-faint);
        }

        /* Parking */
        .park-num {
            font-family: var(--mono);
            font-size: 36px;
            font-weight: 600;
            line-height: 1;
        }

        .park-of {
            font-size: 15px;
            font-weight: 400;
            color: var(--text-faint);
        }

        .park-bar {
            height: 6px;
            background: var(--surface-raised);
            border-radius: 3px;
            margin: 14px 0 10px;
            overflow: hidden;
        }

        .park-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s ease;
        }

        .park-fill.g { background: var(--green); }
        .park-fill.y { background: var(--amber); }
        .park-fill.r { background: var(--red); }

        .park-footer {
            display: flex;
            justify-content: space-between;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-faint);
        }

        /* Transit */
        .dep-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 0;
            border-bottom: 1px solid var(--border-subtle);
        }

        .dep-row:last-child { border-bottom: none; }

        .dep-route {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            min-width: 36px;
            text-align: center;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(59,130,246,0.1);
            color: var(--blue);
        }

        .dep-dest {
            flex: 1;
            font-size: 13px;
            color: var(--text);
        }

        .dep-eta {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 500;
            color: var(--green);
        }

        /* Events */
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 0 28px;
        }

        .evt {
            padding: 9px 0;
            border-bottom: 1px solid var(--border-subtle);
        }

        .evt:last-child { border-bottom: none; }

        .evt-name {
            font-size: 13px;
            font-weight: 500;
        }

        .evt-date {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-faint);
            margin-top: 2px;
        }

        /* ── FEEDS ── */
        .feeds-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .feed-card {
            background: var(--surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .feed-video {
            position: relative;
            aspect-ratio: 16/9;
            background: #0a0c12;
        }

        .feed-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .feed-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(17, 19, 24, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 6px;
            padding: 5px 10px;
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 500;
        }

        .feed-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .feed-dot.on { background: var(--green); }
        .feed-dot.off { background: var(--red); }

        .feed-name {
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-dim);
        }

        /* ── SECTION HEADINGS ── */
        .sh {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 12px;
        }

        .sh-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-faint);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 12px;
        }

        .section { margin-bottom: 24px; }

        /* ── DETECTION LOG ── */
        .det-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }

        .det-item {
            background: var(--surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .det-item:hover { border-color: var(--border); }

        .det-item img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            display: block;
        }

        .det-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            font-size: 12px;
        }

        .det-cam { color: var(--text-dim); }
        .det-cnt { font-family: var(--mono); font-weight: 600; color: var(--green); }
        .det-ts { font-family: var(--mono); font-size: 11px; color: var(--text-faint); }

        /* ── BEST TIMES ── */
        .best-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }

        .best-card {
            background: var(--surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            padding: 16px;
        }

        .best-card h4 { font-size: 13px; font-weight: 600; margin-bottom: 10px; }

        .best-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
        }

        .best-hour { font-family: var(--mono); font-size: 12px; }

        .best-tag {
            font-family: var(--mono);
            font-size: 11px;
            padding: 1px 8px;
            border-radius: 4px;
        }

        .best-tag.lo { background: rgba(34,197,94,0.1); color: var(--green); }
        .best-tag.md { background: rgba(234,179,8,0.1); color: var(--amber); }
        .best-tag.hi { background: rgba(239,68,68,0.1); color: var(--red); }

        /* ── ACTIVITY / ANALYTICS ── */
        .analytics-bar {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .analytics-bar select {
            font-family: var(--sans);
            font-size: 13px;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 5px 8px;
            outline: none;
        }

        .tab-group { display: flex; gap: 2px; }

        .tab-btn {
            font-family: var(--sans);
            font-size: 12px;
            font-weight: 500;
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-faint);
            cursor: pointer;
            transition: all 0.15s;
        }

        .tab-btn:hover { color: var(--text-dim); }
        .tab-btn.on { background: var(--blue); color: #fff; border-color: var(--blue); }

        .chart-card {
            background: var(--surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            padding: 18px 20px;
        }

        .chart-area {
            aspect-ratio: 3.5;
            position: relative;
        }

        .chart-area canvas { width: 100% !important; height: 100% !important; }

        .chart-foot {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-faint);
            text-align: right;
            margin-top: 6px;
        }

        .reset-btn {
            font-family: var(--sans);
            font-size: 11px;
            background: transparent;
            color: var(--text-faint);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 4px 8px;
            cursor: pointer;
            margin-left: auto;
        }

        .reset-btn:hover { color: var(--text-dim); }

        /* Heatmap */
        .hm-grid {
            display: grid;
            grid-template-columns: 36px repeat(24, 1fr);
            gap: 2px;
        }

        .hm-cell {
            height: 20px;
            border-radius: 2px;
            transition: transform 0.1s;
        }

        .hm-cell:hover { transform: scale(1.3); z-index: 2; }

        .hm-lbl {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-faint);
            display: flex;
            align-items: center;
        }

        .hm-hr {
            font-family: var(--mono);
            font-size: 9px;
            color: var(--text-faint);
            text-align: center;
        }

        /* Controls */
        .log-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }

        .log-bar label { font-size: 12px; color: var(--text-dim); }
        .log-bar select { font-size: 12px; }

        .toggle-head {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toggle-head:hover .sh { color: var(--text-dim); }
        .arrow { font-size: 10px; color: var(--text-faint); transition: transform 0.2s; }
        .arrow.shut { transform: rotate(-90deg); }
        .fold { overflow: hidden; transition: max-height 0.25s ease; max-height: 3000px; }
        .fold.shut { max-height: 0; }

        .muted { color: var(--text-faint); font-size: 13px; }

        /* Lightbox */
        .lb { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:200; justify-content:center; align-items:center; cursor:pointer; }
        .lb.on { display:flex; }
        .lb img { max-width:95%; max-height:95%; object-fit:contain; border-radius:8px; }

        /* Responsive */
        @media (max-width: 860px) {
            .grid-2 { grid-template-columns: 1fr; }
            .feeds-grid { grid-template-columns: 1fr; }
            .navbar { padding: 0 16px; }
            .page { padding: 16px 16px 40px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        CSUSM Campus Monitor
    </div>
    <div class="nav-status">
        <span class="live-indicator"></span>
        <span id="last-updated">--</span>
    </div>
</nav>

<div class="page">

    <!-- Conditions -->
    <div class="conditions" id="conditions">
        <div class="cond-item">
            <div class="cond-label">Temperature</div>
            <div class="cond-value" id="c-temp">--</div>
            <div class="cond-sub" id="c-feels">--</div>
        </div>
        <div class="cond-item">
            <div class="cond-label">Humidity</div>
            <div class="cond-value" id="c-hum">--</div>
        </div>
        <div class="cond-item">
            <div class="cond-label">Wind</div>
            <div class="cond-value" id="c-wind">--</div>
        </div>
        <div class="cond-item">
            <div class="cond-label">UV Index</div>
            <div class="cond-value" id="c-uv">--</div>
        </div>
        <div class="cond-item" id="c-aqi-card" style="display:none">
            <div class="cond-label">Air Quality</div>
            <div class="cond-value" id="c-aqi">--</div>
            <div class="cond-sub" id="c-aqi-cat"></div>
        </div>
    </div>

    <!-- Parking + Transit -->
    <div class="grid-2">
        <div class="card">
            <div class="card-head">
                <span class="card-title">Parking</span>
                <span class="card-tag" id="pk-lot">Lot F</span>
            </div>
            <div class="park-num"><span id="pk-avail">--</span> <span class="park-of">/ <span id="pk-total">--</span> spaces</span></div>
            <div class="park-bar"><div class="park-fill g" id="pk-fill" style="width:0%"></div></div>
            <div class="park-footer"><span id="pk-pct">--</span><span id="pk-ts">--</span></div>
        </div>
        <div class="card">
            <div class="card-head">
                <span class="card-title">SPRINTER</span>
                <span class="card-tag">CSUSM Station</span>
            </div>
            <div id="transit-box"><span class="muted">Loading...</span></div>
        </div>
    </div>

    <!-- Events -->
    <div class="card section">
        <div class="card-head">
            <span class="card-title">Upcoming Events</span>
        </div>
        <div class="events-grid" id="events-box"><span class="muted">Loading...</span></div>
    </div>

    <!-- Feeds -->
    <div class="section">
        <div class="sh-label">Live Feeds</div>
        <div class="feeds-grid" id="feeds"></div>
    </div>

    <!-- Detection Log -->
    <div class="section">
        <div class="toggle-head" onclick="toggleFold('det-fold')">
            <span class="sh">Detection Log</span>
            <span class="arrow" id="det-fold-arrow">&#9660;</span>
        </div>
        <div id="det-fold" class="fold">
            <div class="log-bar">
                <label>Filter:</label>
                <select id="log-camera-filter"><option value="">All Cameras</option></select>
                <span class="card-tag" id="log-count"></span>
            </div>
            <div class="det-grid" id="detection-log"></div>
        </div>
    </div>

    <!-- Best Times -->
    <div class="section">
        <div class="sh-label">Best Times to Visit</div>
        <div id="best-times-container" class="best-grid"></div>
    </div>

    <!-- Activity -->
    <div class="section">
        <div class="sh-label">Activity</div>
        <div class="analytics-bar">
            <select id="trend-camera"></select>
            <div class="tab-group">
                <button class="tab-btn on" data-view="today" onclick="switchView('today')">Today</button>
                <button class="tab-btn" data-view="hourly" onclick="switchView('hourly')">Hourly Avg</button>
                <button class="tab-btn" data-view="heatmap" onclick="switchView('heatmap')">Heatmap</button>
            </div>
            <button class="reset-btn" onclick="resetZoom()">Reset Zoom</button>
        </div>
        <div class="chart-card">
            <div class="chart-area">
                <canvas id="timeline-chart"></canvas>
                <div id="heatmap-container" style="display:none"></div>
            </div>
            <div class="chart-foot">Scroll to zoom &middot; Drag to pan</div>
        </div>
    </div>

</div>

<div class="lb" id="lightbox"><img id="lb-img" /></div>

<script>
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const CAM_NAMES = {};
const WMO = {0:'\u2600\uFE0F',1:'\uD83C\uDF24',2:'\u26C5',3:'\u2601\uFE0F',45:'\uD83C\uDF2B',48:'\uD83C\uDF2B',51:'\uD83C\uDF26',53:'\uD83C\uDF27',55:'\uD83C\uDF27',61:'\uD83C\uDF27',63:'\uD83C\uDF27',65:'\uD83C\uDF27',71:'\uD83C\uDF28',73:'\uD83C\uDF28',75:'\u2744\uFE0F',80:'\uD83C\uDF26',81:'\uD83C\uDF27',82:'\u26C8',95:'\u26C8',96:'\u26C8',99:'\u26C8'};
let chart = null, view = 'today', cameras = [], lastIds = '';

async function init() {
    const data = (await (await fetch('/api/cameras')).json());
    cameras = data.cameras;
    const feeds = document.getElementById('feeds');
    const camSel = document.getElementById('trend-camera');
    const logSel = document.getElementById('log-camera-filter');

    camSel.innerHTML = '<option value="_all">All Cameras</option>';
    cameras.forEach(cam => {
        CAM_NAMES[cam.id] = cam.name;
        // Feed card
        const d = document.createElement('div');
        d.className = 'feed-card';
        d.innerHTML = `<div class="feed-video"><video id="v-${cam.id}" muted playsinline></video><div class="feed-badge"><span class="feed-dot" id="h-${cam.id}"></span><span id="n-${cam.id}">--</span></div></div><div class="feed-name">${cam.name}</div>`;
        feeds.appendChild(d);
        const vid = document.getElementById(`v-${cam.id}`);
        if (Hls.isSupported()) {
            const hls = new Hls({enableWorker:true,liveSyncDurationCount:3,liveMaxLatencyDurationCount:6,maxBufferLength:15,maxMaxBufferLength:30});
            hls.loadSource(cam.stream_url); hls.attachMedia(vid);
            hls.on(Hls.Events.MANIFEST_PARSED, () => vid.play().catch(()=>{}));
            hls.on(Hls.Events.ERROR, (_,d) => { if(d.fatal) hls.startLoad(); });
        } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
            vid.src = cam.stream_url;
            vid.addEventListener('loadedmetadata', () => vid.play().catch(()=>{}));
        }
        [camSel, logSel].forEach(s => { const o = document.createElement('option'); o.value = cam.id; o.textContent = cam.name; s.appendChild(o); });
    });

    document.getElementById('lightbox').addEventListener('click', () => document.getElementById('lightbox').classList.remove('on'));
    camSel.addEventListener('change', loadView);
    logSel.addEventListener('change', loadLog);

    poll(); setInterval(poll, 3000);
    cond(); setInterval(cond, 60000);
    park(); setInterval(park, 60000);
    transit(); setInterval(transit, 60000);
    events(); setInterval(events, 300000);
    best(); setInterval(best, 120000);
    loadView(); setInterval(loadView, 60000);
    loadLog(); setInterval(loadLog, 10000);
}

async function poll() {
    try {
        const d = (await (await fetch('/api/status')).json());
        d.cameras.forEach(c => {
            const n = document.getElementById(`n-${c.id}`);
            const h = document.getElementById(`h-${c.id}`);
            if (n) n.textContent = `${c.count} ${c.count===1?'person':'people'}`;
            if (h) h.className = `feed-dot ${c.healthy?'on':'off'}`;
        });
        document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
    } catch(e) {}
}

function cond() {
    fetch('/api/conditions').then(r=>r.json()).then(d => {
        if (!d.weather) return;
        const w = d.weather;
        const icon = WMO[w.weather_code]||'';
        document.getElementById('c-temp').textContent = `${icon} ${Math.round(w.temperature)}°F`;
        document.getElementById('c-feels').textContent = `Feels like ${Math.round(w.apparent_temperature)}°`;
        const hEl = document.getElementById('c-hum');
        hEl.textContent = `${Math.round(w.humidity)}%`;
        hEl.style.color = w.humidity>80?'var(--red)':w.humidity>60?'var(--amber)':'var(--green)';
        const dirs = ['N','NE','E','SE','S','SW','W','NW'];
        document.getElementById('c-wind').textContent = `${Math.round(w.wind_speed)} mph ${dirs[Math.round(w.wind_direction/45)%8]}`;
        const uEl = document.getElementById('c-uv');
        uEl.textContent = w.uv_index.toFixed(1);
        uEl.style.color = w.uv_index>=8?'var(--red)':w.uv_index>=6?'var(--amber)':w.uv_index>=3?'var(--amber)':'var(--green)';
        if (d.aqi) {
            document.getElementById('c-aqi-card').style.display = '';
            document.getElementById('c-aqi').textContent = d.aqi.aqi;
            document.getElementById('c-aqi').style.color = d.aqi.aqi>100?'var(--red)':d.aqi.aqi>50?'var(--amber)':'var(--green)';
            document.getElementById('c-aqi-cat').textContent = d.aqi.category;
        }
    }).catch(()=>{});
}

function park() {
    fetch('/api/parking').then(r=>r.json()).then(d => {
        if (!d.lots||!d.lots.length) return;
        const l = d.lots[0];
        document.getElementById('pk-lot').textContent = `Lot ${l.lot_id}`;
        document.getElementById('pk-avail').textContent = l.available;
        document.getElementById('pk-total').textContent = l.total;
        const p = l.percent_full;
        const f = document.getElementById('pk-fill');
        f.style.width = p+'%';
        f.className = 'park-fill '+(p>75?'r':p>50?'y':'g');
        document.getElementById('pk-pct').textContent = p+'% full';
        document.getElementById('pk-ts').textContent = l.timestamp;
    }).catch(()=>{});
}

function transit() {
    fetch('/api/transit').then(r=>r.json()).then(d => {
        const el = document.getElementById('transit-box');
        if (!d.departures||!d.departures.length) { el.innerHTML='<span class="muted">No upcoming departures</span>'; return; }
        const seen = new Set();
        const uniq = d.departures.filter(x => { const k=x.time+x.direction; if(seen.has(k)) return false; seen.add(k); return true; });
        el.innerHTML = uniq.slice(0,5).map(x => `<div class="dep-row"><span class="dep-route">${x.route}</span><span class="dep-dest">${x.direction}</span><span class="dep-eta">${x.minutes_away} min</span></div>`).join('');
    }).catch(()=>{});
}

function events() {
    fetch('/api/events').then(r=>r.json()).then(d => {
        const el = document.getElementById('events-box');
        if (!d.events||!d.events.length) { el.innerHTML='<span class="muted">No upcoming events</span>'; return; }
        el.innerHTML = d.events.slice(0,6).map(e => `<div class="evt"><div class="evt-name">${e.title}</div><div class="evt-date">${e.date||''}${e.location?' \u2022 '+e.location:''}</div></div>`).join('');
    }).catch(()=>{});
}

async function loadLog() {
    const f = document.getElementById('log-camera-filter').value;
    const url = f?`/api/detection-log?camera=${f}&limit=20`:'/api/detection-log?limit=20';
    try {
        const d = (await (await fetch(url)).json());
        const el = document.getElementById('detection-log');
        const ct = document.getElementById('log-count');
        if (!d.detections.length) { el.innerHTML='<span class="muted">No detections yet</span>'; ct.textContent=''; lastIds=''; return; }
        ct.textContent = d.detections.length+' detections';
        const ids = d.detections.map(x=>`${x.camera}:${x.filename}`).join(',');
        if (ids===lastIds) return;
        lastIds = ids;
        el.innerHTML = d.detections.map(x => `<div class="det-item" onclick="openLb('${x.url}')"><img src="${x.url}" loading="lazy"/><div class="det-info"><span class="det-cam">${CAM_NAMES[x.camera]||x.camera}</span><span class="det-cnt">${x.count} ${x.count===1?'person':'people'}</span><span class="det-ts">${x.timestamp}</span></div></div>`).join('');
    } catch(e) {}
}

function openLb(u) { document.getElementById('lb-img').src=u; document.getElementById('lightbox').classList.add('on'); }

async function best() {
    const c = document.getElementById('best-times-container');
    try {
        const res = await Promise.all(cameras.map(x => fetch(`/api/history/best-times?camera=${x.id}&days=7`).then(r=>r.json())));
        c.innerHTML = res.map((r,i) => {
            const cam = cameras[i], top = r.data.slice(0,5);
            if (!top.length) return `<div class="best-card"><h4>${cam.name}</h4><span class="muted">Not enough data</span></div>`;
            const mx = Math.max(...r.data.map(d=>d.avg_count),1);
            return `<div class="best-card"><h4>${cam.name}</h4>${top.map(t => {
                const p=t.avg_count/mx, cls=p<.33?'lo':p<.66?'md':'hi';
                const h=t.hour, lbl=h===0?'12 AM':h<12?h+' AM':h===12?'12 PM':(h-12)+' PM';
                return `<div class="best-row"><span class="best-hour">${lbl}</span><span class="best-tag ${cls}">avg ${t.avg_count}</span></div>`;
            }).join('')}</div>`;
        }).join('');
    } catch(e) {}
}

function switchView(v) { view=v; document.querySelectorAll('.tab-btn').forEach(t=>t.classList.toggle('on',t.dataset.view===v)); loadView(); }

async function loadView() {
    const cam = document.getElementById('trend-camera').value;
    if (!cam) return;
    const cv = document.getElementById('timeline-chart');
    const hm = document.getElementById('heatmap-container');
    if (view==='heatmap') {
        cv.style.display='none'; hm.style.display='block';
        const d = (await (await fetch(`/api/history/heatmap?camera=${cam}&days=7`)).json());
        renderHM(d.data);
    } else {
        cv.style.display='block'; hm.style.display='none';
        if (view==='today') {
            const d = (await (await fetch(`/api/history/timeline?camera=${cam}`)).json());
            renderChart(d.data.map(x=>x.time), d.data.map(x=>x.avg_count), 'People', '#3b82f6');
        } else {
            const d = (await (await fetch(`/api/history/hourly?camera=${cam}&days=7`)).json());
            const lbl = d.data.map(x => { const h=x.hour; return h===0?'12 AM':h<12?h+' AM':h===12?'12 PM':(h-12)+' PM'; });
            renderChart(lbl, d.data.map(x=>x.avg_count), 'Avg People', '#a78bfa');
        }
    }
}

function renderChart(labels, vals, label, color) {
    const ctx = document.getElementById('timeline-chart').getContext('2d');
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
        type:'line',
        data:{labels,datasets:[{label,data:vals,borderColor:color,backgroundColor:color+'14',fill:true,tension:.35,pointRadius:vals.length>50?0:2,pointHoverRadius:4,borderWidth:1.5}]},
        options:{
            responsive:true,maintainAspectRatio:false,
            interaction:{mode:'index',intersect:false},
            plugins:{
                legend:{display:false},
                tooltip:{backgroundColor:'#191c24',titleColor:'#e4e7ed',bodyColor:'#8b919e',titleFont:{family:"'DM Sans'"},bodyFont:{family:"'JetBrains Mono'",size:11},borderColor:'#282c37',borderWidth:1,padding:10,cornerRadius:8},
                zoom:{pan:{enabled:true,mode:'x'},zoom:{wheel:{enabled:true},pinch:{enabled:true},mode:'x'}}
            },
            scales:{
                x:{ticks:{color:'#565c6a',font:{family:"'JetBrains Mono'",size:10},maxTicksLimit:14,maxRotation:45},grid:{color:'rgba(255,255,255,0.03)'}},
                y:{beginAtZero:true,ticks:{color:'#565c6a',font:{family:"'JetBrains Mono'",size:10}},grid:{color:'rgba(255,255,255,0.03)'}}
            }
        }
    });
}

function resetZoom() { if(chart) chart.resetZoom(); }

function renderHM(data) {
    const el = document.getElementById('heatmap-container');
    const map = {}; let mx = 1;
    data.forEach(d => { map[d.day_of_week+'-'+d.hour]=d.avg_count; if(d.avg_count>mx) mx=d.avg_count; });
    let h = '<div class="hm-grid"><div class="hm-lbl"></div>';
    for (let i=0;i<24;i++) h+=`<div class="hm-hr">${i}</div>`;
    for (let d=0;d<7;d++) {
        h+=`<div class="hm-lbl">${DAYS[d]}</div>`;
        for (let i=0;i<24;i++) {
            const v=map[d+'-'+i]||0, a=v/mx;
            const bg=v>0?`rgba(59,130,246,${(.08+a*.6).toFixed(2)})`:'rgba(255,255,255,0.02)';
            h+=`<div class="hm-cell" style="background:${bg}" title="${DAYS[d]} ${i}:00 — avg ${v}"></div>`;
        }
    }
    h+='</div>';
    h+='<div style="display:flex;gap:4px;align-items:center;justify-content:flex-end;margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--text-faint)"><span>Less</span>';
    [0,.2,.4,.6,.8,1].forEach(i => h+=`<div style="width:14px;height:10px;border-radius:2px;background:rgba(59,130,246,${(.08+i*.6).toFixed(2)})"></div>`);
    h+='<span>More</span></div>';
    el.innerHTML = h;
}

function toggleFold(id) {
    document.getElementById(id).classList.toggle('shut');
    document.getElementById(id+'-arrow').classList.toggle('shut');
}

init();
</script>
</body>
</html>
