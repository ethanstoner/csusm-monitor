services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    ports:
      - "5000:5000"
    volumes:
      - ./frigate/config.yml:/config/config.yml
      - frigate-media:/media/frigate
    depends_on:
      - mosquitto

volumes:
  frigate-media:
